name: CI

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  quality:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Typecheck
        run: npm run typecheck

      - name: Rule invariants and randomized properties
        run: npm run test:invariants

      - name: Deterministic golden simulations
        run: npm run test:golden

      - name: Published artifact contract
        run: npm run test:artifacts

      - name: Coverage report
        run: npm run test:coverage

      - name: Production build
        run: npm run build
